  <!-- Navbar -->
  <nav>
    <h1>🌿 CropCare</h1>
  </nav>

  <div class="container">
    <form id="yieldForm" class="form-box">
      <h1>🌱 Crop Yield Prediction</h1>

      <label for="cropType">Crop Type</label>
      <select id="cropType" name="cropType" required>
        <option value="">Select Crop</option>
        <option value="Wheat">Wheat</option>
        <option value="Rice">Rice</option>
        <option value="Maize">Maize</option>
        <option value="Sugarcane">Sugarcane</option>
      </select>

      <label for="soilType">Soil Type</label>
      <select id="soilType" name="soilType" required>
        <option value="">Select Soil</option>
        <option value="Clay">Clay</option>
        <option value="Loamy">Loamy</option>
        <option value="Sandy">Sandy</option>
      </select>

      <label for="soilQuality">Soil Quality</label>
      <input type="text" id="soilQuality" name="soilQuality" placeholder="Good / Medium / Poor" required>

      <label for="n">Nitrogen (N)</label>
      <input type="number" id="n" name="n" required>

      <label for="p">Phosphorus (P)</label>
      <input type="number" id="p" name="p" required>

      <label for="k">Potassium (K)</label>
      <input type="number" id="k" name="k" required>

      <label for="temperature">Temperature (°C)</label>
      <input type="number" step="0.1" id="temperature" name="temperature" required>

      <label for="humidity">Humidity (%)</label>
      <input type="number" step="0.1" id="humidity" name="humidity" required>

      <label for="ph">Soil pH</label>
      <input type="number" step="0.1" id="ph" name="ph" required>

      <label for="windSpeed">Wind Speed</label>
      <input type="number" step="0.1" id="windSpeed" name="windSpeed" required>

      <button type="submit">🌿 Predict</button>
    </form>

    <div id="resultBox" class="result-box">
      <h2>Predicted Crop Yield:</h2>
      <p id="predictionValue">--</p>
    </div>
  </div>
